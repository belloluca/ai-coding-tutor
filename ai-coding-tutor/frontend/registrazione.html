<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrazione - AI Coding Tutor</title>
  <link rel="stylesheet" href="style_registrazione.css">
</head>

<body class="auth-page">

  <main class="auth-box">

    <header>
      <h1>Registrazione</h1>
      <p>Crea un account per accedere alle funzionalità personalizzate del chatbot.</p>
    </header>

    <form id="FormRegistrazione">

      <div class="field">
        <label for="nome">Nome</label>
        <input id="nome" name="nome" type="text" required>
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" required>
      </div>

      <label class="privacy">
        <input id="privacy" name="privacy" type="checkbox" required>
        <span>Accetto il trattamento dei dati necessari per utilizzare il servizio.</span>
      </label>

      <div id="feedback" class="feedback"></div>

      <div class="actions">
        <a href="Home_page.html">Torna alla Home Page</a>
        <button type="submit">Registrati</button>
      </div>

    </form>

  </main>

</body>
</html>
